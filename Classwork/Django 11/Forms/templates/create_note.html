<h1>Create note</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send</button>
</form>

{% if submitted_data %}
    <h2>Submitted</h2>
    <p>Title: {{ submitted_data.title }}</p>
    <p>Content: {{ submitted_data.content }}</p>
    <p>Category: {{ submitted_data.category }}</p>
    <p>Tags: {{ submitted_data.tags }}</p>
{% endif %}
