{% extends "base.html" %}
{% block title %}{{ article.title }} - Northbyte Models{% endblock %}
{% block content %}
<article class="detail">
    <p>{{ article.author }} / {{ article.category.name }}</p>
    <h1>{{ article.title }}</h1>
    <img src="{{ article.image_url }}" alt="{{ article.title }}">
    <p>{{ article.excerpt }}</p>
    <div>{{ article.content|linebreaks }}</div>
</article>
{% endblock %}
