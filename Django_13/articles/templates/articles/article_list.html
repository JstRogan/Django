{% extends "base.html" %}
{% block content %}
<h1>Articles</h1>
<div class="grid">
    {% for article in articles %}
        <article class="card">
            <img src="{{ article.image_url }}" alt="{{ article.title }}">
            <h2><a href="{{ article.get_absolute_url }}">{{ article.title }}</a></h2>
            <p>{{ article.author }} / {{ article.category.name }}</p>
            <p>{{ article.excerpt }}</p>
        </article>
    {% empty %}
        <p>No articles yet. Add them from the admin panel.</p>
    {% endfor %}
</div>
{% endblock %}
