{% extends "blog/base.html" %}

{% block title %}Список постов{% endblock %}

{% block content %}
    <h2>Список постов</h2>
    <ul>
        {% for post in posts %}
            <li>
                <a href="/posts/{{ post.id }}/">{{ post.title }}</a>
                <p>{{ post.content }}</p>
            </li>
        {% empty %}
            <li>Постов пока нет.</li>
        {% endfor %}
    </ul>
{% endblock %}
