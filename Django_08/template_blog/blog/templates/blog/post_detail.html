{% extends "blog/base.html" %}

{% block title %}Детали поста{% endblock %}

{% block content %}
    {% if post %}
        <h2>{{ post.title }}</h2>
        <p>{{ post.content }}</p>
        <p>Автор: {{ post.author }}</p>
    {% else %}
        <h2>Пост не найден</h2>
    {% endif %}
{% endblock %}
