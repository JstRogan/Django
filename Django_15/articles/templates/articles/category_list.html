{% extends "base.html" %}
{% block title %}Categories - Northbyte{% endblock %}
{% block content %}
<section class="section-head"><h1>Categories</h1></section>
<div class="category-grid">
    {% for category in categories %}
        <a class="category-tile" href="{% url 'articles:category_detail' category.slug %}">{{ category.name }}</a>
    {% endfor %}
</div>
{% endblock %}
